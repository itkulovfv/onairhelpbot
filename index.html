<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freedom On Air</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --f-green: #028140;
            --f-bg: #EDFBFF;
            --f-white: #FFFFFF;
            --f-black: #0B1015;
            --f-red: #E30613;
        }

        body {
            background-color: var(--f-bg);
            color: var(--f-black);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background-color: var(--f-white);
            border-bottom: 1px solid rgba(2, 129, 64, 0.1);
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1.5px;
            color: #164734;
        }

        .container {
            width: 92%;
            max-width: 400px;
        }

        .card {
            background: var(--f-white);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-left: 4px solid var(--f-green);
            padding-left: 12px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background-color: var(--f-green);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-red {
            background: transparent;
            border: 1.5px solid var(--f-red);
            color: var(--f-red);
        }

        .btn:active {
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--f-black);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>FREEDOM ON AIR</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header"><div class="card-title">Инвестор</div></div>
            <div class="btn-group">
                <button class="btn" onclick="document.getElementById('file-inv').click()">+ Результат</button>
                <button class="btn btn-red" onclick="send('delete_3', 'Investor')">Удалить -3</button>
            </div>
            <input type="file" id="file-inv" accept="image/*" onchange="handleFile(this, 'Investor')">
        </div>

        <div class="card">
            <div class="card-header"><div class="card-title">Трейдер</div></div>
            <div class="btn-group">
                <button class="btn" onclick="document.getElementById('file-trd').click()">+ Результат</button>
                <button class="btn btn-red" onclick="send('delete_3', 'Trader')">Удалить -3</button>
            </div>
            <input type="file" id="file-trd" accept="image/*" onchange="handleFile(this, 'Trader')">
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoX0Va03wRt316MfQnVBPRBKn8KLIg8fZfAGBbjEns2eUwoxcaueZcRtdpAIE2vya3BQ/exec";

        function status(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function handleFile(input, sheet) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            status("Обработка...");
            reader.onloadend = () => send('upload_and_add', sheet, reader.result);
            reader.readAsDataURL(input.files[0]);
            input.value = "";
        }

        async function send(action, sheet, file = "") {
            const initData = tg.initData;
            if (!initData) return;

            status("Синхронизация...");

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Оставляем для GAS, чтобы избежать CORS preflight issues
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: action,
                        sheet_name: sheet,
                        initData: initData,
                        file_base64: file
                    })
                });
                status("Готово!");
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                status("Ошибка");
            }
        }
    </script>
</body>
</html>
