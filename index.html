<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freedom On Air</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --f-green: #028140; --f-bg: #EDFBFF; --f-white: #FFFFFF; --f-black: #0B1015; --f-gray: #6C7278; }
        body { background-color: var(--f-bg); color: var(--f-black); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 25px 0; text-align: center; background: var(--f-white); border-bottom: 1px solid #d1eef5; margin-bottom: 20px; }
        .header h1 { font-size: 18px; margin: 0; font-weight: 700; color: #164734; letter-spacing: 1px; }

        .container { width: 92%; max-width: 400px; }
        
        .card { background: var(--f-white); border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; margin-bottom: 15px; border-left: 4px solid var(--f-green); padding-left: 12px; }
        .card-title { font-size: 14px; font-weight: 800; color: var(--f-black); text-transform: uppercase; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { background: var(--f-green); color: white; border: none; border-radius: 12px; padding: 16px 5px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-red { background: transparent; border: 1.5px solid #E30613; color: #E30613; } /* Красный акцент для удаления */
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        #toast { position: fixed; bottom: 30px; background: var(--f-black); color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="header"><h1>FREEDOM ON AIR</h1></div>

    <div class="container">
        
        <div class="card">
            <div class="card-header"><div class="card-title">Подписка Инвестора</div></div>
            <div class="btn-group">
                <button class="btn" onclick="call('investor_add')">Добавить (+3)</button>
                <button class="btn btn-red" onclick="call('investor_del')">Удалить (-3)</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><div class="card-title">Подписка Трейдера</div></div>
            <div class="btn-group">
                <button class="btn" onclick="call('trader_add')">Добавить (+3)</button>
                <button class="btn btn-red" onclick="call('trader_del')">Удалить (-3)</button>
            </div>
        </div>

    </div>

    <div id="toast">Запрос отправлен...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCmxFktlAkg-UBAR82Fg48ZF5vgaSPUxA0D7nZNtva8mNxx5xcqdiN4bTdtUkwEOZ7vQ/exec";

        async function call(actionName) {
            const user = tg.initDataUnsafe.user;
            if (!user) return;

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: actionName, user_id: user.id })
                });
                toast.innerText = "Готово!";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                toast.innerText = "Ошибка";
                tg.HapticFeedback.notificationOccurred('error');
            }

            setTimeout(() => { toast.style.display = 'none'; toast.innerText = "Запрос отправлен..."; }, 2500);
        }
    </script>
</body>
</html>
